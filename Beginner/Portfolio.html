<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merlin Martina S | Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ===== CSS VARIABLES ===== */
:root {
  --cyan: #00f5ff;
  --purple: #bf00ff;
  --pink: #ff006e;
  --dark-bg: #020408;
  --dark-surface: #080d14;
  --dark-card: rgba(8, 18, 30, 0.85);
  --dark-border: rgba(0, 245, 255, 0.15);
  --dark-text: #e0f7ff;
  --dark-muted: #6b8fa8;
  --light-bg: #f0f4f8;
  --light-surface: #ffffff;
  --light-card: rgba(255,255,255,0.85);
  --light-border: rgba(0, 100, 180, 0.2);
  --light-text: #0a1628;
  --light-muted: #4a6080;
  --font-display: 'Orbitron', monospace;
  --font-body: 'Syne', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --glow-cyan: 0 0 20px rgba(0,245,255,0.4), 0 0 60px rgba(0,245,255,0.15);
  --glow-purple: 0 0 20px rgba(191,0,255,0.4), 0 0 60px rgba(191,0,255,0.15);
  --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
[data-theme="dark"] {
  --bg: var(--dark-bg);
  --surface: var(--dark-surface);
  --card: var(--dark-card);
  --border: var(--dark-border);
  --text: var(--dark-text);
  --muted: var(--dark-muted);
}
[data-theme="light"] {
  --bg: var(--light-bg);
  --surface: var(--light-surface);
  --card: var(--light-card);
  --border: var(--light-border);
  --text: var(--light-text);
  --muted: var(--light-muted);
}

/* ===== RESET & BASE ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  cursor: none;
  overflow-x: hidden;
  transition: background 0.4s, color 0.4s;
}
a { text-decoration: none; color: inherit; }
ul { list-style: none; }

/* ===== LOADING SCREEN ===== */
#loader {
  position: fixed; inset: 0;
  background: #020408;
  z-index: 9999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 24px;
}
.loader-ring {
  width: 80px; height: 80px;
  border: 3px solid transparent;
  border-top-color: var(--cyan);
  border-right-color: var(--purple);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  box-shadow: var(--glow-cyan);
}
.loader-text {
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: 6px;
  color: var(--cyan);
  animation: pulse 1s ease-in-out infinite alternate;
}
.loader-bar-wrap {
  width: 200px; height: 2px;
  background: rgba(0,245,255,0.1);
  border-radius: 2px; overflow: hidden;
}
.loader-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--purple));
  border-radius: 2px;
  animation: loadBar 1.8s ease forwards;
}
@keyframes loadBar { from{width:0} to{width:100%} }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { from{opacity:0.4} to{opacity:1} }

/* ===== CUSTOM CURSOR ===== */
#cursor {
  width: 12px; height: 12px;
  background: var(--cyan);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: transform 0.1s, width 0.2s, height 0.2s, background 0.2s;
  box-shadow: 0 0 10px var(--cyan), 0 0 20px rgba(0,245,255,0.5);
  mix-blend-mode: screen;
}
#cursor-ring {
  width: 36px; height: 36px;
  border: 1px solid rgba(0,245,255,0.5);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9997;
  transform: translate(-50%, -50%);
  transition: all 0.15s ease;
}
body:has(a:hover) #cursor, body:has(button:hover) #cursor {
  width: 20px; height: 20px;
  background: var(--purple);
}

/* ===== CANVAS BACKGROUND ===== */
#bg-canvas {
  position: fixed; inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ===== NAVBAR ===== */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 0 5%;
  height: 70px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(2,4,8,0.7);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  transition: var(--transition);
}
[data-theme="light"] nav { background: rgba(240,244,248,0.85); }
.nav-logo {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
}
.nav-links {
  display: flex; gap: 32px;
}
.nav-links a {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  position: relative;
  transition: color 0.3s;
}
.nav-links a::after {
  content: '';
  position: absolute; bottom: -4px; left: 0;
  width: 0; height: 1px;
  background: var(--cyan);
  transition: width 0.3s;
}
.nav-links a:hover { color: var(--cyan); }
.nav-links a:hover::after { width: 100%; }
.nav-right { display: flex; align-items: center; gap: 16px; }
#theme-toggle {
  width: 44px; height: 24px;
  background: rgba(0,245,255,0.1);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: none;
  position: relative;
  transition: var(--transition);
}
#theme-toggle::before {
  content: '';
  position: absolute; top: 3px; left: 3px;
  width: 18px; height: 18px;
  background: var(--cyan);
  border-radius: 50%;
  transition: transform 0.3s;
  box-shadow: 0 0 8px var(--cyan);
}
[data-theme="light"] #theme-toggle::before { transform: translateX(20px); background: var(--purple); box-shadow: 0 0 8px var(--purple); }
.nav-burger { display: none; flex-direction: column; gap: 5px; cursor: none; }
.nav-burger span { display: block; width: 24px; height: 2px; background: var(--cyan); border-radius: 2px; transition: var(--transition); }

/* ===== SECTIONS BASE ===== */
section {
  position: relative; z-index: 1;
  padding: 100px 5%;
}

/* ===== HERO ===== */
#hero {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  padding-top: 70px;
}
.hero-inner { max-width: 900px; }
.hero-tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 4px;
  color: var(--cyan);
  border: 1px solid rgba(0,245,255,0.3);
  padding: 6px 16px; border-radius: 20px;
  margin-bottom: 28px;
  background: rgba(0,245,255,0.05);
  animation: fadeDown 0.8s ease both;
}
.hero-name {
  font-family: var(--font-display);
  font-size: clamp(36px, 7vw, 80px);
  font-weight: 900;
  line-height: 1.1;
  letter-spacing: -1px;
  background: linear-gradient(135deg, #fff 0%, var(--cyan) 40%, var(--purple) 80%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: fadeDown 0.9s ease 0.1s both;
  margin-bottom: 20px;
}
[data-theme="light"] .hero-name {
  background: linear-gradient(135deg, #0a1628 0%, #0060b0 40%, #7700cc 80%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.hero-typing-wrap {
  font-family: var(--font-mono);
  font-size: clamp(13px, 2vw, 18px);
  color: var(--muted);
  min-height: 28px;
  margin-bottom: 36px;
  animation: fadeDown 1s ease 0.2s both;
}
#typed-text { color: var(--cyan); }
.cursor-blink {
  display: inline-block;
  width: 2px; height: 1em;
  background: var(--cyan);
  margin-left: 3px;
  animation: blink 0.8s step-end infinite;
  vertical-align: text-bottom;
}
@keyframes blink { 50% { opacity: 0; } }
.hero-desc {
  font-size: 16px; line-height: 1.8;
  color: var(--muted); max-width: 580px;
  margin: 0 auto 44px;
  animation: fadeDown 1s ease 0.3s both;
}
.hero-btns {
  display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
  animation: fadeDown 1s ease 0.4s both;
}
.btn {
  font-family: var(--font-display);
  font-size: 11px; letter-spacing: 3px;
  font-weight: 600;
  padding: 14px 32px;
  border-radius: 4px;
  cursor: none;
  transition: var(--transition);
  position: relative; overflow: hidden;
  text-transform: uppercase;
}
.btn-primary {
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  color: #000;
  border: none;
  box-shadow: 0 0 30px rgba(0,245,255,0.3);
}
.btn-primary:hover { transform: translateY(-3px); box-shadow: 0 0 50px rgba(0,245,255,0.5), 0 10px 30px rgba(0,0,0,0.3); }
.btn-secondary {
  background: transparent;
  color: var(--cyan);
  border: 1px solid rgba(0,245,255,0.4);
}
.btn-secondary:hover { background: rgba(0,245,255,0.08); transform: translateY(-3px); box-shadow: var(--glow-cyan); }
.hero-scroll {
  position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 3px;
  color: var(--muted);
  animation: fadeUp 1s ease 1s both;
}
.scroll-line {
  width: 1px; height: 48px;
  background: linear-gradient(to bottom, var(--cyan), transparent);
  animation: scrollDrop 1.5s ease-in-out infinite;
}
@keyframes scrollDrop { 0%,100%{opacity:0;transform:scaleY(0);transform-origin:top} 50%{opacity:1;transform:scaleY(1)} }
@keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

/* ===== SECTION HEADING ===== */
.section-tag {
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 5px;
  color: var(--cyan);
  text-transform: uppercase;
  margin-bottom: 12px;
  display: block;
}
.section-title {
  font-family: var(--font-display);
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 16px;
}
.grad-text {
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.section-line {
  width: 60px; height: 2px;
  background: linear-gradient(90deg, var(--cyan), var(--purple));
  border-radius: 2px;
  margin-bottom: 60px;
}

/* ===== ABOUT ===== */
.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: start;
}
.about-text p {
  font-size: 16px; line-height: 1.9;
  color: var(--muted);
  margin-bottom: 20px;
}
.about-cards {
  display: grid; gap: 16px;
}
.info-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
  backdrop-filter: blur(16px);
  display: flex; align-items: center; gap: 16px;
  transition: var(--transition);
  position: relative; overflow: hidden;
}
.info-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(0,245,255,0.03), rgba(191,0,255,0.03));
  opacity: 0; transition: opacity 0.3s;
}
.info-card:hover { transform: translateX(6px); border-color: rgba(0,245,255,0.35); box-shadow: var(--glow-cyan); }
.info-card:hover::before { opacity: 1; }
.card-icon {
  font-size: 22px; width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,245,255,0.08);
  border: 1px solid rgba(0,245,255,0.2);
  border-radius: 10px; flex-shrink: 0;
}
.card-label {
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 3px; color: var(--cyan);
  text-transform: uppercase; display: block; margin-bottom: 4px;
}
.card-value { font-size: 14px; font-weight: 600; }

/* ===== SKILLS ===== */
#skills { background: transparent; }
.skills-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 32px;
}
.skill-category {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  backdrop-filter: blur(16px);
  transition: var(--transition);
}
.skill-category:hover { border-color: rgba(0,245,255,0.3); transform: translateY(-4px); box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.skill-cat-title {
  font-family: var(--font-display);
  font-size: 13px; letter-spacing: 2px;
  color: var(--cyan);
  margin-bottom: 24px;
  display: flex; align-items: center; gap: 10px;
}
.skill-cat-title::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(0,245,255,0.3), transparent);
}
.skill-item { margin-bottom: 20px; }
.skill-row {
  display: flex; justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 12px; margin-bottom: 8px;
}
.skill-name { color: var(--text); }
.skill-pct { color: var(--cyan); }
.skill-bar-bg {
  height: 4px; background: rgba(255,255,255,0.06);
  border-radius: 4px; overflow: hidden;
}
.skill-bar {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--cyan), var(--purple));
  width: 0;
  transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 8px rgba(0,245,255,0.4);
}

/* ===== PROJECTS ===== */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
}
.project-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  backdrop-filter: blur(16px);
  transition: var(--transition);
  position: relative; overflow: hidden;
}
.project-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--cyan), var(--purple));
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.4s;
}
.project-card:hover { transform: translateY(-8px); border-color: rgba(0,245,255,0.25); box-shadow: 0 30px 80px rgba(0,0,0,0.4); }
.project-card:hover::before { transform: scaleX(1); }
.project-num {
  font-family: var(--font-display);
  font-size: 40px; font-weight: 900;
  color: rgba(0,245,255,0.06);
  position: absolute; top: 16px; right: 24px;
  line-height: 1;
}
.project-tags {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 16px;
}
.project-tag {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 2px;
  padding: 4px 10px; border-radius: 20px;
  background: rgba(0,245,255,0.08);
  border: 1px solid rgba(0,245,255,0.2);
  color: var(--cyan);
}
.project-title {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 700;
  margin-bottom: 12px; letter-spacing: 0.5px;
}
.project-desc {
  font-size: 14px; line-height: 1.8;
  color: var(--muted); margin-bottom: 24px;
}
.project-links {
  display: flex; gap: 12px;
}
.project-link {
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 2px;
  padding: 8px 16px; border-radius: 4px;
  border: 1px solid rgba(0,245,255,0.3);
  color: var(--cyan);
  transition: var(--transition);
}
.project-link:hover { background: rgba(0,245,255,0.1); box-shadow: var(--glow-cyan); }
.project-link.filled {
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  color: #000; border: none;
}
.project-link.filled:hover { transform: scale(1.03); }

/* ===== EDUCATION ===== */
.edu-timeline { position: relative; padding-left: 32px; }
.edu-timeline::before {
  content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
  width: 1px;
  background: linear-gradient(to bottom, var(--cyan), var(--purple), transparent);
}
.edu-item {
  position: relative; margin-bottom: 48px;
  padding: 28px 32px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  backdrop-filter: blur(16px);
  transition: var(--transition);
}
.edu-item::before {
  content: ''; position: absolute;
  left: -40px; top: 32px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--cyan);
  border: 3px solid var(--bg);
  box-shadow: var(--glow-cyan);
}
.edu-item:hover { border-color: rgba(0,245,255,0.3); transform: translateX(6px); }
.edu-period {
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 3px;
  color: var(--cyan); margin-bottom: 8px;
}
.edu-degree {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 700;
  margin-bottom: 4px;
}
.edu-school {
  font-size: 14px; color: var(--muted);
  margin-bottom: 12px;
}
.edu-desc { font-size: 14px; line-height: 1.7; color: var(--muted); }
.edu-badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 2px;
  padding: 4px 12px; border-radius: 20px;
  background: rgba(191,0,255,0.1);
  border: 1px solid rgba(191,0,255,0.3);
  color: var(--purple); margin-top: 12px;
}

/* ===== EXPERIENCE ===== */
.exp-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}
.exp-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  backdrop-filter: blur(16px);
  transition: var(--transition);
  position: relative; overflow: hidden;
}
.exp-card:hover { border-color: rgba(191,0,255,0.3); transform: translateY(-5px); box-shadow: var(--glow-purple); }
.exp-card-icon {
  font-size: 28px; margin-bottom: 16px;
  display: block;
}
.exp-card-title {
  font-family: var(--font-display);
  font-size: 15px; font-weight: 700;
  margin-bottom: 8px; letter-spacing: 0.5px;
}
.exp-card-org {
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 2px;
  color: var(--purple); margin-bottom: 12px;
}
.exp-card-desc { font-size: 13px; line-height: 1.7; color: var(--muted); }
.exp-card-date {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 2px;
  color: var(--muted); margin-top: 16px;
  border-top: 1px solid var(--border);
  padding-top: 12px;
}

/* ===== CONTACT ===== */
.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 60px;
  align-items: start;
}
.contact-info { }
.contact-info p {
  font-size: 16px; line-height: 1.9;
  color: var(--muted); margin-bottom: 32px;
}
.contact-links { display: flex; flex-direction: column; gap: 16px; }
.contact-link-item {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  backdrop-filter: blur(16px);
  transition: var(--transition);
}
.contact-link-item:hover { border-color: rgba(0,245,255,0.3); transform: translateX(6px); }
.contact-link-icon { font-size: 20px; }
.contact-link-label {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 3px;
  color: var(--cyan); display: block; margin-bottom: 2px;
}
.contact-link-val { font-size: 14px; }
.contact-form { display: flex; flex-direction: column; gap: 16px; }
.form-group { position: relative; }
.form-input, .form-textarea {
  width: 100%;
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 16px 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  outline: none;
  transition: var(--transition);
  resize: none;
  backdrop-filter: blur(16px);
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--muted); }
.form-input:focus, .form-textarea:focus {
  border-color: rgba(0,245,255,0.5);
  box-shadow: 0 0 20px rgba(0,245,255,0.1);
}
.form-textarea { min-height: 130px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ===== FOOTER ===== */
footer {
  position: relative; z-index: 1;
  text-align: center; padding: 40px 5%;
  border-top: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 2px;
